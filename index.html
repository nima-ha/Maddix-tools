<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme:light)"/>
<meta name="theme-color" content="#0e0e0e" media="(prefers-color-scheme:dark)"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="description" content="Maddix Tools — browser-based security workstation: IP scanner, payload generator, network tools, encoders & more."/>
<meta name="author" content="Mohammad Mehrani"/>
<title>Maddix Tools — Security Toolkit</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>"/>
<link rel="stylesheet" href="styles.css"/>
<script>
(function(){try{var p=JSON.parse(localStorage.getItem('maddixPrefs')||'{}');var t=p.theme||'auto';var d=t==='dark'||(t==='auto'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches);if(d)document.documentElement.classList.add('dark')}catch(e){}})();
</script>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{padding-top:calc(env(safe-area-inset-top)+3.5rem);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif}
html{line-height:1.5;-webkit-text-size-adjust:100%;tab-size:4;background:#fff;color:#0e0e0e;scrollbar-gutter:stable}
html.dark{background:#0e0e0e;color:#fafafa}
.jn-loading{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:16px;padding:25vh 24px 24px;text-align:center;background:#fff}
html.dark .jn-loading{background:#0e0e0e}
.jn-loading>svg,.jn-loading>div,.jn-loading>.jn-spinner,.jn-loading>p{transition:opacity .18s ease-out,transform .2s cubic-bezier(.55,0,.7,0)}
.jn-loading.jn-loading-stage-1>:not(svg){opacity:0}
.jn-loading.jn-loading-stage-2>svg{opacity:0;transform:scale(0)}
.jn-loading svg{width:96px;height:96px}
.jn-loading p{margin:0;font-size:14px;color:#6b7280;line-height:1.5}
.jn-spinner{width:28px;height:28px;border:4px solid #16a34a;border-left-color:transparent;border-radius:50%;animation:jn-spin 1s linear infinite}
@keyframes jn-spin{to{transform:rotate(360deg)}}
html[data-booting] #app{opacity:0}
#app{transition:opacity .32s ease-out}
#app.jn-app-enter{opacity:1}
</style>
</head>
<body>
<div id="jn-loading" class="jn-loading" role="status" aria-live="polite">
  <svg viewBox="0 0 100 100" aria-hidden="true"><text y=".9em" font-size="90">🛠️</text></svg>
  <div><p lang="en">Loading Maddix Tools...</p><p lang="fa" style="display:none" dir="rtl">در حال بارگذاری...</p></div>
  <div class="jn-spinner" aria-label="Loading"></div>
</div>
<noscript><p style="padding:40px;text-align:center">Maddix Tools requires JavaScript.</p></noscript>
<div id="app" vaul-drawer-wrapper></div>
<script src="app.js"></script>
</body>
</html>
